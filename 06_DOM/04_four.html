<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121; color: aliceblue; ">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>
    function addLang(langName){
        const ul = document.querySelector('.language');
        let li = document.createElement('li');
        //li.innerHTML = `${langName}` // not optimzed
        let text = document.createTextNode(langName);
        li.appendChild(text);
        ul.appendChild(li);
    }
    addLang('Java')
    addLang('Python')

    //Optimized Way

</script>
</html>
