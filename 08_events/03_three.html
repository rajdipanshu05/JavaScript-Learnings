
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setInterval Notes</title>
</head>

<body>
    <h1>Chai aur Javascript</h1>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
</body>

<script>

// ===============================
// 🔥 setInterval (COMPLETE NOTES)
// ===============================


// --------------------------------------
// 🔹 1. BASIC FUNCTION
// --------------------------------------

const sayDate = function(str){
    console.log(str, Date.now());
}

// 👉 prints string + current timestamp


// --------------------------------------
// 🔹 2. setInterval
// --------------------------------------

// syntax:
// setInterval(function, delay, arg1, arg2...)

const intervalId = setInterval(sayDate, 1000, "hi");

// 👉 every 1 second → sayDate runs
// Output:
// hi 171xxxxxxx
// hi 171xxxxxxx
// hi 171xxxxxxx


// --------------------------------------
// 🔹 3. clearInterval ⚠️
// --------------------------------------

// clearInterval(intervalId);

// 👉 stops interval execution
// 👉 must pass reference (intervalId)


// --------------------------------------
// 🔥 IMPORTANT ISSUE IN YOUR CODE ⚠️
// --------------------------------------

// ❌ immediately stopping interval
clearInterval(intervalId);

// 👉 isliye kuch bhi print nahi hoga


// --------------------------------------
// 🔹 4. CORRECT WAY (START / STOP BUTTON)
// --------------------------------------

let intervalRef;

document.querySelector('#start').addEventListener('click', function(){

    // prevent multiple intervals
    if (!intervalRef) {
        intervalRef = setInterval(sayDate, 1000, "hi");
    }

});

document.querySelector('#stop').addEventListener('click', function(){

    clearInterval(intervalRef);
    intervalRef = null;

    console.log("Stopped");

});


// --------------------------------------
// 🔹 5. HOW setInterval WORKS ⭐
// --------------------------------------

// 1. goes to Web API
// 2. runs every interval
// 3. callback goes to queue
// 4. event loop executes it

// 👉 async behavior


// --------------------------------------
// 🔹 6. DIFFERENCE (VERY IMPORTANT)
// --------------------------------------

// setTimeout → runs once
// setInterval → runs repeatedly


// --------------------------------------
// 🔹 7. COMMON MISTAKES ⚠️
// --------------------------------------

// ❌ calling function directly
// setInterval(sayDate(), 1000)

// ❌ multiple intervals stacking

// ❌ forgetting clearInterval


// --------------------------------------
// 🔹 8. REAL USE CASES
// --------------------------------------

// 👉 clock / timer
// 👉 polling API
// 👉 animations
// 👉 auto refresh


// --------------------------------------
// 🔹 9. IMPORTANT NOTES
// --------------------------------------

// ✔ interval is NOT exact timing
// ✔ depends on call stack
// ✔ always clear interval when not needed


// ===============================
// ⚡ FINAL TAKEAWAY
// ===============================

// setInterval → repeat task
// clearInterval → stop it
// async → handled by event loop
// always store reference

</script>

</html>
